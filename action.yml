name: OCI Image Detector
description: >
  Scan a directory tree for OCI/Docker image references in Dockerfiles,
  Helm values files, Terraform configs, and generic text files.
  Returns a JSON findings file and a findings count output.

author: malachowski-labs

branding:
  icon: search
  color: blue

inputs:
  version:
    description: >
      Release tag to download (e.g. "v0.3.0"). Defaults to "latest", which
      resolves the most recent published release at run time.
    required: false
    default: latest

  directory:
    description: Root directory to scan (default ".").
    required: false
    default: .

  exclude:
    description: >
      Newline-separated list of doublestar glob patterns to exclude
      (e.g. "vendor/**\ntest/**"). Each non-empty line becomes a separate
      --exclude flag.
    required: false
    default: ''

  output-file:
    description: >
      Path where the JSON findings report is written. When left empty the
      JSON report is written to a temporary file so the findings-count output
      is always available; the path is exposed via the output-file output.
    required: false
    default: ''

  allow-empty:
    description: Exit 0 when no image references are found (default "false").
    required: false
    default: 'false'

  verbose:
    description: Enable debug logging on stderr (default "false").
    required: false
    default: 'false'

outputs:
  findings-count:
    description: Number of image references found.
    value: ${{ steps.count.outputs.findings-count }}

  output-file:
    description: Absolute path to the JSON findings report.
    value: ${{ steps.resolve-output.outputs.output-file }}

runs:
  using: composite
  steps:
    # ------------------------------------------------------------------ #
    # 1. Resolve the requested version tag                                 #
    # ------------------------------------------------------------------ #
    - name: Resolve version
      id: resolve-version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ "$INPUT_VERSION" = "latest" ]; then
          TAG=$(gh release view \
            --repo malachowski-labs/oci-image-detector \
            --json tagName \
            --jq .tagName)
        else
          TAG="$INPUT_VERSION"
        fi
        # Use the EOF-delimiter syntax to prevent newline injection into
        # GITHUB_OUTPUT — a version string should never contain newlines,
        # but defense in depth costs nothing here.
        {
          echo "tag<<EOF"
          printf '%s\n' "$TAG"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------ #
    # 2. Detect OS / architecture and pick the right archive              #
    # ------------------------------------------------------------------ #
    - name: Detect platform
      id: platform
      shell: bash
      run: |
        OS="$(uname -s)"
        ARCH="$(uname -m)"

        case "$OS" in
          Linux)   OS_KEY="linux"   ;;
          Darwin)  OS_KEY="darwin"  ;;
          MINGW*|MSYS*|CYGWIN*) OS_KEY="windows" ;;
          *) echo "::error::Unsupported OS: $OS"; exit 1 ;;
        esac

        case "$ARCH" in
          x86_64)          ARCH_KEY="amd64" ;;
          aarch64|arm64)   ARCH_KEY="arm64" ;;
          *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        SUFFIX="${OS_KEY}_${ARCH_KEY}"
        if [ "$OS_KEY" = "windows" ]; then
          echo "archive=oci-image-detector_${SUFFIX}.zip" >> "$GITHUB_OUTPUT"
          echo "ext=.exe"                                 >> "$GITHUB_OUTPUT"
        else
          echo "archive=oci-image-detector_${SUFFIX}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "ext="                                         >> "$GITHUB_OUTPUT"
        fi
        echo "os=$OS_KEY" >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------ #
    # 3. Download + extract the binary                                    #
    # ------------------------------------------------------------------ #
    - name: Download binary
      shell: bash
      env:
        TAG:      ${{ steps.resolve-version.outputs.tag }}
        ARCHIVE:  ${{ steps.platform.outputs.archive }}
        OS_KEY:   ${{ steps.platform.outputs.os }}
        EXT:      ${{ steps.platform.outputs.ext }}
        GH_TOKEN: ${{ github.token }}
      run: |
        # Use mktemp so that multiple uses of this action in one job each get
        # their own directory — avoids the second invocation silently reusing
        # the binary from the first with a potentially different version.
        DEST="$(mktemp -d "$RUNNER_TEMP/oci-image-detector-XXXXXX")"

        gh release download "$TAG" \
          --repo malachowski-labs/oci-image-detector \
          --pattern "$ARCHIVE" \
          --dir "$DEST"

        if [ "$OS_KEY" = "windows" ]; then
          unzip -q "$DEST/$ARCHIVE" -d "$DEST"
        else
          tar -xzf "$DEST/$ARCHIVE" -C "$DEST"
        fi

        BIN="$DEST/oci-image-detector${EXT}"
        chmod +x "$BIN"
        echo "$DEST" >> "$GITHUB_PATH"

    # ------------------------------------------------------------------ #
    # 4. Resolve (or create) the output file path                         #
    # ------------------------------------------------------------------ #
    - name: Resolve output file
      id: resolve-output
      shell: bash
      env:
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        if [ -n "$INPUT_OUTPUT_FILE" ]; then
          OUT="$INPUT_OUTPUT_FILE"
        else
          OUT="$RUNNER_TEMP/oci-image-detector-findings.json"
        fi
        # EOF-delimiter prevents path injection into GITHUB_OUTPUT.
        {
          echo "output-file<<EOF"
          printf '%s\n' "$OUT"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------ #
    # 5. Build flag array and run the scan                                 #
    # ------------------------------------------------------------------ #
    - name: Run scan
      shell: bash
      env:
        INPUT_DIRECTORY:   ${{ inputs.directory }}
        INPUT_EXCLUDE:     ${{ inputs.exclude }}
        INPUT_ALLOW_EMPTY: ${{ inputs.allow-empty }}
        INPUT_VERBOSE:     ${{ inputs.verbose }}
        OUTPUT_FILE:       ${{ steps.resolve-output.outputs.output-file }}
      run: |
        ARGS=(--directory "$INPUT_DIRECTORY" --output-file "$OUTPUT_FILE")

        # Each non-empty line in the exclude input becomes its own --exclude flag.
        while IFS= read -r pattern; do
          [[ -z "$pattern" ]] && continue
          ARGS+=(--exclude "$pattern")
        done <<< "$INPUT_EXCLUDE"

        [[ "$INPUT_ALLOW_EMPTY" == "true" ]] && ARGS+=(--allow-empty)
        [[ "$INPUT_VERBOSE"     == "true" ]] && ARGS+=(--verbose)

        oci-image-detector "${ARGS[@]}"

    # ------------------------------------------------------------------ #
    # 6. Count findings from the JSON report                              #
    # ------------------------------------------------------------------ #
    - name: Count findings
      id: count
      shell: bash
      env:
        OUTPUT_FILE: ${{ steps.resolve-output.outputs.output-file }}
      run: |
        # Guard against a missing report file (e.g. disk-full / permission error
        # in the reporter) so the error message is actionable rather than a
        # cryptic "No such file" from jq.
        if [[ ! -f "$OUTPUT_FILE" ]]; then
          echo "::error::JSON report not found at '$OUTPUT_FILE'. Check for reporter errors above."
          exit 1
        fi
        # .findings is always an array (never null) — see reporter/json.go.
        COUNT=$(jq '.findings | length' "$OUTPUT_FILE")
        echo "findings-count=$COUNT" >> "$GITHUB_OUTPUT"

name: OCI Image Detector
description: Scan a directory tree for OCI/Docker image references.

author: malachowski-labs

branding:
  icon: search
  color: blue

inputs:
  version:
    description: Docker image tag to run (e.g. "v0.5.0"). Defaults to "latest".
    required: false
    default: latest

  directory:
    description: Directory to scan, relative to the repository root. Must be a relative path.
    required: false
    default: .

  exclude:
    description: Newline-separated doublestar glob patterns to exclude (e.g. "vendor/**\ntest/**").
    required: false
    default: ''

  exclude-images:
    description: Newline-separated doublestar glob patterns to exclude findings by image reference (e.g. "localhost:5000/**\n*.example.com/**").
    required: false
    default: ''

  allow-empty:
    description: Exit 0 when no image references are found (default "false").
    required: false
    default: 'false'

  verbose:
    description: Enable debug logging on stderr (default "false").
    required: false
    default: 'false'

outputs:
  findings-count:
    description: Number of image references found.
    value: ${{ steps.scan.outputs.findings-count }}

  output-file:
    description: Absolute path to the JSON findings report in the runner's temp directory.
    value: ${{ steps.scan.outputs.output-file }}

runs:
  using: composite
  steps:
    - name: Scan
      id: scan
      shell: bash
      env:
        INPUT_VERSION:     ${{ inputs.version }}
        INPUT_DIRECTORY:   ${{ inputs.directory }}
        INPUT_EXCLUDE:        ${{ inputs.exclude }}
        INPUT_EXCLUDE_IMAGES: ${{ inputs.exclude-images }}
        INPUT_ALLOW_EMPTY:    ${{ inputs.allow-empty }}
        INPUT_VERBOSE:        ${{ inputs.verbose }}
      run: |
        if [[ "$INPUT_DIRECTORY" = /* ]]; then
          echo "::error::'directory' must be a relative path (got: '$INPUT_DIRECTORY')"
          exit 1
        fi

        IMAGE="ghcr.io/malachowski-labs/oci-image-detector:${INPUT_VERSION}"
        OUTDIR="$RUNNER_TEMP/oci-image-detector"
        OUTPUT_FILE="$OUTDIR/findings.json"
        mkdir -p "$OUTDIR"
        # The container runs as UID 65532 (nonroot); 777 lets it write here.
        chmod 777 "$OUTDIR"

        ARGS=(
          --directory "/github/workspace/${INPUT_DIRECTORY}"
          --output-file "$OUTPUT_FILE"
        )

        while IFS= read -r pattern; do
          [[ -z "$pattern" ]] && continue
          ARGS+=(--exclude "$pattern")
        done <<< "$INPUT_EXCLUDE"

        while IFS= read -r pattern; do
          [[ -z "$pattern" ]] && continue
          ARGS+=(--exclude-images "$pattern")
        done <<< "$INPUT_EXCLUDE_IMAGES"

        [[ "$INPUT_ALLOW_EMPTY" == "true" ]] && ARGS+=(--allow-empty)
        [[ "$INPUT_VERBOSE"     == "true" ]] && ARGS+=(--verbose)

        docker run --rm \
          --network none \
          --volume "$GITHUB_WORKSPACE:/github/workspace:ro" \
          --volume "$OUTDIR:$OUTDIR" \
          "$IMAGE" \
          "${ARGS[@]}"

        if [[ ! -f "$OUTPUT_FILE" ]]; then
          echo "::error::JSON report not found at '$OUTPUT_FILE'. Check for docker errors above."
          exit 1
        fi
        echo "findings-count=$(jq '.findings | length' "$OUTPUT_FILE")" >> "$GITHUB_OUTPUT"
        echo "output-file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

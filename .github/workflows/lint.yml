name: lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: 'go.mod'
          # golangci-lint manages its own cache; disable setup-go's to avoid
          # double-caching and unnecessary cache invalidation.
          cache: false

      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          # Pin to a specific version so CI is reproducible and Renovate bumps
          # it intentionally rather than a new release breaking checks silently.
          version: v2.12.2

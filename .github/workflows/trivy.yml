name: trivy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  schedule:
    # Weekly full scan — catches newly-published CVEs between PRs.
    - cron: '17 5 * * 1'

permissions:
  contents: read
  # Required to upload SARIF results to the GitHub Security tab.
  security-events: write

jobs:
  scan-fs:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # Cover Go module vulnerabilities, secrets, and misconfigs in one pass.
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        # Upload even when Trivy exits non-zero (findings present) so results
        # always land in the Security tab.
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # scan-image will be added here once a Dockerfile and container build
  # pipeline exist. It will build the image, run:
  #   aquasecurity/trivy-action with scan-type: image
  # and upload a second SARIF file under category: trivy-image.

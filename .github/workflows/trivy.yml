name: trivy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  schedule:
    # Weekly full scan — catches newly-published CVEs between PRs.
    - cron: '17 5 * * 1'

permissions:
  contents: read
  # Required to upload SARIF results to the GitHub Security tab.
  security-events: write

jobs:
  scan-fs:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # Cover Go module vulnerabilities, secrets, and misconfigs in one pass.
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif

      - uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        # Upload even when Trivy exits non-zero (findings present) so results
        # always land in the Security tab.
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # scan-image will be added here once a Dockerfile and container build
  # pipeline exist. It will build the image, run:
  #   aquasecurity/trivy-action with scan-type: image
  # and upload a second SARIF file under category: trivy-image.

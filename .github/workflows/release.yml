name: release

# Trigger only after tests pass to avoid tagging a broken commit.
on:
  workflow_run:
    workflows: ["test"]
    types:
      - completed
    branches:
      - main

# Serialise release runs — prevents a duplicate-tag race when two commits
# land on main in quick succession.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-latest
    # Only proceed when:
    #   1. The upstream test run was successful.
    #   2. It was triggered by a direct push (not a PR from a fork) — prevents
    #      a fork PR whose tests pass from triggering a privileged release run
    #      via the workflow_run event.
    #   3. The originating repository is this repo, not a fork.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # Explicitly check out the tested commit, not whatever HEAD points to
          # when the release job runs — prevents tagging a different commit when
          # new pushes land on main between the test run and this job.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install svu
        # Download the pre-built binary directly from the release — no Go
        # toolchain compilation, deterministic version, no missing action.
        run: |
          curl -sSfL https://github.com/caarlos0/svu/releases/download/v3.4.1/svu_3.4.1_linux_amd64.tar.gz \
            | tar -xz svu
          sudo mv svu /usr/local/bin/svu

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute versions
        id: version
        run: |
          CURRENT=$(svu current || echo "v0.0.0")
          NEXT=$(svu next)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.version.outputs.current != steps.version.outputs.next
        env:
          NEXT_TAG: ${{ steps.version.outputs.next }}
        run: |
          git tag "$NEXT_TAG"
          git push origin "$NEXT_TAG"

      - name: Create GitHub release
        if: steps.version.outputs.current != steps.version.outputs.next
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.next }}
          generate_release_notes: true

name: release

on:
  push:
    branches:
      - main

# Serialise release runs — prevents a duplicate-tag race when two commits
# land on main in quick succession.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create tags + GitHub releases
      packages: write  # push to ghcr.io
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install svu
        # Download the pre-built binary directly from the release — no Go
        # toolchain compilation, deterministic version, no missing action.
        run: |
          curl -sSfL https://github.com/caarlos0/svu/releases/download/v3.4.1/svu_3.4.1_linux_amd64.tar.gz \
            | tar -xz svu
          sudo mv svu /usr/local/bin/svu

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute versions
        id: version
        run: |
          CURRENT=$(svu current || echo "v0.0.0")
          NEXT=$(svu next)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.version.outputs.current != steps.version.outputs.next
        env:
          NEXT_TAG: ${{ steps.version.outputs.next }}
        run: |
          git tag "$NEXT_TAG"
          git push origin "$NEXT_TAG"

      - name: Build release binaries
        if: steps.version.outputs.current != steps.version.outputs.next
        env:
          NEXT_TAG: ${{ steps.version.outputs.next }}
        run: |
          mkdir -p dist
          BIN="oci-image-detector"

          # Ordered list of "OS ARCH SUFFIX" triples — deterministic log output,
          # no bash 4 associative-array requirement.
          TARGETS=(
            "linux   amd64 linux_amd64"
            "linux   arm64 linux_arm64"
            "darwin  amd64 darwin_amd64"
            "darwin  arm64 darwin_arm64"
            "windows amd64 windows_amd64"
          )

          for ENTRY in "${TARGETS[@]}"; do
            read -r OS ARCH SUFFIX <<< "$ENTRY"
            ARCHIVE="dist/oci-image-detector_${SUFFIX}"

            if [ "$OS" = "windows" ]; then
              GOOS="$OS" GOARCH="$ARCH" CGO_ENABLED=0 \
                go build -trimpath \
                  -ldflags="-s -w -X 'main.version=${NEXT_TAG}'" \
                  -o "dist/${BIN}.exe" ./
              zip "${ARCHIVE}.zip" -j "dist/${BIN}.exe"
              rm "dist/${BIN}.exe"
            else
              GOOS="$OS" GOARCH="$ARCH" CGO_ENABLED=0 \
                go build -trimpath \
                  -ldflags="-s -w -X 'main.version=${NEXT_TAG}'" \
                  -o "dist/${BIN}" ./
              tar -czf "${ARCHIVE}.tar.gz" -C dist "${BIN}"
              rm "dist/${BIN}"
            fi
          done

          # Generate a single checksum file for all release archives so
          # consumers can verify integrity without trusting HTTPS alone.
          cd dist && sha256sum \
            oci-image-detector_linux_amd64.tar.gz \
            oci-image-detector_linux_arm64.tar.gz \
            oci-image-detector_darwin_amd64.tar.gz \
            oci-image-detector_darwin_arm64.tar.gz \
            oci-image-detector_windows_amd64.zip \
            > sha256sums.txt

      - name: Create GitHub release
        if: steps.version.outputs.current != steps.version.outputs.next
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.version.outputs.next }}
          generate_release_notes: true
          files: |
            dist/oci-image-detector_linux_amd64.tar.gz
            dist/oci-image-detector_linux_arm64.tar.gz
            dist/oci-image-detector_darwin_amd64.tar.gz
            dist/oci-image-detector_darwin_arm64.tar.gz
            dist/oci-image-detector_windows_amd64.zip
            dist/sha256sums.txt

      # ── Docker image ──────────────────────────────────────────────────── #
      # Built and pushed only when a new version tag was created above.
      # Produces a multi-arch manifest (linux/amd64 + linux/arm64) and tags
      # both the exact version and `latest` on ghcr.io.

      - name: Set up QEMU
        if: steps.version.outputs.current != steps.version.outputs.next
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        if: steps.version.outputs.current != steps.version.outputs.next
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: steps.version.outputs.current != steps.version.outputs.next
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          # Use repository_owner (org/user) rather than actor so that bots
          # (Renovate, Dependabot) triggering a push don't need packages:write
          # on their own tokens.
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.version.outputs.current != steps.version.outputs.next
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.next }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.version.outputs.current != steps.version.outputs.next
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.next }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach a SLSA Level 1 provenance attestation to the image manifest
          # for supply-chain transparency. Consumers can verify with:
          #   gh attestation verify oci://ghcr.io/... --repo malachowski-labs/oci-image-detector
          provenance: mode=min
          sbom: false

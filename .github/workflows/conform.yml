name: conform

on:
  pull_request:
    branches:
      - main
  merge_group:


jobs:
  conform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # Check out the real PR branch HEAD, not the synthetic merge commit
          # that actions/checkout produces by default on pull_request events.
          # Without this, conform sees the auto-merge commit in the range and
          # fails because it is not a conventional commit.
          ref: ${{ github.event.pull_request.head.sha }}

      # Fetch the base branch as a local ref so conform can resolve it.
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}

      - uses: docker://ghcr.io/siderolabs/conform:v0.1.0-alpha.31
        with:
          args: enforce --base-branch ${{ github.event.pull_request.base.ref }}
